<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว - นายธราเทพ พลเดช</title>
    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff; /* พื้นหลังสีขาวสะอาดตา */
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* เลเยอร์การ์ดประวัติส่วนตัว */
        .profile-container {
            background-color: #ffffff;
            max-width: 600px;
            width: 100%;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0, 91, 187, 0.06);
            position: relative;
        }

        /* แถบสีน้ำเงินดีไซน์ด้านบน */
        .profile-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, #002d62, #0056b3);
            border-radius: 24px 24px 0 0;
        }

        /* หัวข้อประวัติส่วนตัว */
        h1 {
            font-size: 28px;
            color: #002d62;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        /* เลเยอร์การจัดวางข้อมูล (Information Grid) */
        .info-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 35px;
        }

        /* แถวข้อมูลแต่ละหัวข้อ */
        .info-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            align-items: center;
            padding: 12px 15px;
            background-color: #f8fafc; /* ขาวอมเทาน้ำเงินจางๆ ช่วยแบ่งเลเยอร์ */
            border-radius: 12px;
            border-left: 4px solid #0056b3; /* เส้นขอบสีน้ำเงินนำสายตา */
            transition: all 0.2s ease;
        }

        .info-row:hover {
            transform: translateX(5px);
            background-color: #f1f5f9;
        }

        .info-label {
            font-size: 16px;
            color: #64748b;
            font-weight: 600;
        }

        .info-value {
            font-size: 18px;
            color: #002d62;
            font-weight: 500;
        }

        /* โซนปุ่มกดนำทาง */
        .button-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            text-align: center;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        /* ปุ่มย้อนกลับ (เน้นสีขาว-น้ำเงินคลีนๆ) */
        .btn-secondary {
            background-color: #ffffff;
            color: #0056b3;
            border: 2px solid #0056b3;
        }

        .btn-secondary:hover {
            background-color: #f0f7ff;
            transform: translateY(-2px);
        }

        /* ปุ่มสำหรับหน้าถัดไปในอนาคต (ถ้ามี) */
        .btn-primary {
            background: linear-gradient(135deg, #003a8c 0%, #0056b3 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #0056b3 0%, #007bff 100%);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        
        <h1>📄 ประวัติส่วนตัว</h1>
        
        <div class="info-grid">
            <div class="info-row">
                <div class="info-label">ชื่อ-นามสกุล</div>
                <div class="info-value">นายธราเทพ พลเดช</div>
            </div>
            
            <div class="info-row">
                <div class="info-label">ชื่อเล่น</div>
                <div class="info-value">เชฟ</div>
            </div>
            
            <div class="info-row">
                <div class="info-label">สถานะภาพ</div>
                <div class="info-value">นักเรียน (ชั้นมัธยมศึกษาปีที่ 6/2)</div>
            </div>
            
            <div class="info-row">
                <div class="info-label">สถานศึกษา</div>
                <div class="info-value">โรงเรียนพานทอง อ.พานทอง จ.ชลบุรี</div>
            </div>

            <div class="info-row">
                <div class="info-label">ช่องทางติดต่อ</div>
                <div class="info-value"> FB Imyour Chef
                    IG caxethay51
                    0855472734  </div>
            </div>
        </div>
        
        <div class="button-group">
            <a href="index.html" class="btn btn-secondary">← ย้อนกลับหน้าแรก</a>
            <a href="#" class="btn btn-primary">ดูผลงานของฉัน →</a>
        </div>
        
    </div>

</body>
</html>

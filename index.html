    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;

            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .nav-menu {
            margin-bottom: 20px;
        }
        .nav-menu a {
            text-decoration: none;
            color: #555;

        .nav-menu a:hover, .nav-menu a.active {

        }

            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #007bff;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            color: #007bff;
            margin-bottom: 10px;
        }
        .info {
            font-size: 18px;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn-link {
            display: inline-block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-link:hover {
            background-color: #0056b3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
